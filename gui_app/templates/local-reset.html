<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - BotifyTrades</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }
        .container {
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 16px;
            padding: 50px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 35px;
        }
        .botify-logo-mark {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0FF0B3 0%, #7C3AED 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(15, 240, 179, 0.3);
        }
        .logo-symbol {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #0E1117;
            letter-spacing: -1px;
        }
        .logo h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #0FF0B3, #7C3AED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .logo p {
            color: #888;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .subtitle {
            color: #aaa;
            font-size: 15px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #aaa;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 50, 80, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .form-group input::placeholder {
            color: #666;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 80, 120, 0.4);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        }
        .code-input {
            font-family: 'Space Grotesk', monospace;
            font-size: 24px !important;
            letter-spacing: 8px;
            text-align: center;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        .error-message, .success-message {
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 14px;
            line-height: 1.5;
        }
        .error-message {
            background: rgba(255, 82, 82, 0.15);
            border: 1px solid rgba(255, 82, 82, 0.4);
            color: #ff8888;
        }
        .success-message {
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: #00ff88;
        }
        .footer-links {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .footer-links a {
            color: #00d4ff;
            text-decoration: none;
            font-size: 13px;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="botify-logo-mark">
                <span class="logo-symbol">BT</span>
            </div>
            <h1>BotifyTrades</h1>
            <p>Password Reset</p>
        </div>
        
        <p class="subtitle">Enter your username, recovery code, and new password</p>
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        {% if success %}
        <div class="success-message">Password reset successful! You can now <a href="/login" style="color: #00ff88;">log in</a> with your new password.</div>
        {% else %}
        <form method="POST" action="/local-reset">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="code">Recovery Code</label>
                <input type="text" id="code" name="code" class="code-input" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required>
            </div>
            
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="At least 8 characters" minlength="8" required>
            </div>
            
            <div class="form-group">
                <label for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" placeholder="Confirm your password" required>
            </div>
            
            <button type="submit" class="submit-btn">Reset Password</button>
        </form>
        {% endif %}
        
        <div class="footer-links">
            <a href="/login">Back to Login</a>
        </div>
    </div>
</body>
</html>
