{% extends "base.html" %}

{% block title %}Trades - Ψ∿ BotifyTrades{% endblock %}

{% block content %}
<style>
.risk-badges { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; max-width: 260px; }
.risk-badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 7px; border-radius: 6px; font-size: 10px; font-weight: 700;
    letter-spacing: 0.3px; white-space: nowrap; border: 1px solid;
    transition: all 0.3s ease;
}
.risk-badge.rb-monitoring { background: rgba(0,245,255,0.08); color: #00f5ff; border-color: rgba(0,245,255,0.25); }
.risk-badge.rb-sl { background: rgba(255,59,48,0.1); color: #ff3b30; border-color: rgba(255,59,48,0.3); }
.risk-badge.rb-pt { background: rgba(48,209,88,0.1); color: #30d158; border-color: rgba(48,209,88,0.3); }
.risk-badge.rb-pt-hit { background: rgba(48,209,88,0.25); color: #30d158; border-color: rgba(48,209,88,0.5); }
.risk-badge.rb-trail-ready { background: rgba(175,130,255,0.08); color: rgba(175,130,255,0.5); border-color: rgba(175,130,255,0.15); }
.risk-badge.rb-trail-active { background: rgba(175,130,255,0.18); color: #af82ff; border-color: rgba(175,130,255,0.4); animation: riskPulse 2s ease-in-out infinite; }
.risk-badge.rb-early-ready { background: rgba(6,182,212,0.08); color: rgba(6,182,212,0.5); border-color: rgba(6,182,212,0.15); }
.risk-badge.rb-early-breakeven { background: rgba(6,182,212,0.18); color: #06b6d4; border-color: rgba(6,182,212,0.4); animation: riskPulse 2s ease-in-out infinite; }
.risk-badge.rb-early-profit { background: rgba(34,197,94,0.2); color: #22c55e; border-color: rgba(34,197,94,0.45); animation: riskPulse 1.5s ease-in-out infinite; }
.risk-badge.rb-giveback-ready { background: rgba(251,191,36,0.08); color: rgba(251,191,36,0.5); border-color: rgba(251,191,36,0.15); }
.risk-badge.rb-giveback-armed { background: rgba(251,191,36,0.2); color: #fbbf24; border-color: rgba(251,191,36,0.45); animation: riskPulse 2s ease-in-out infinite; }
.risk-badge.rb-dynamic-sl { background: rgba(255,149,0,0.12); color: #ff9500; border-color: rgba(255,149,0,0.3); }
.risk-badge.rb-closing { background: rgba(255,59,48,0.25); color: #ff3b30; border-color: rgba(255,59,48,0.5); animation: riskPulse 0.8s ease-in-out infinite; }
.risk-badge .rb-dot {
    width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
}
.risk-badge.rb-monitoring .rb-dot { background: #00f5ff; box-shadow: 0 0 4px #00f5ff; }
.risk-badge.rb-sl .rb-dot { background: #ff3b30; }
.risk-badge.rb-pt .rb-dot { background: #30d158; }
.risk-badge.rb-trail-active .rb-dot { background: #af82ff; box-shadow: 0 0 4px #af82ff; }
.risk-badge.rb-early-breakeven .rb-dot { background: #06b6d4; box-shadow: 0 0 4px #06b6d4; }
.risk-badge.rb-early-profit .rb-dot { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
.risk-badge.rb-giveback-armed .rb-dot { background: #fbbf24; box-shadow: 0 0 4px #fbbf24; }
.risk-badge.rb-closing .rb-dot { background: #ff3b30; box-shadow: 0 0 6px #ff3b30; }
@keyframes riskPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}
.risk-tooltip {
    position: relative; cursor: help;
}
.risk-tooltip .risk-tooltip-text {
    visibility: hidden; opacity: 0;
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: #1a1d23; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
    padding: 10px 14px; min-width: 220px; max-width: 300px; z-index: 1000;
    font-size: 11px; color: #c9d1d9; line-height: 1.5; white-space: normal;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); transition: all 0.2s ease;
    pointer-events: none;
}
.risk-tooltip:hover .risk-tooltip-text { visibility: visible; opacity: 1; }
.risk-tooltip-text .rtt-row { display: flex; justify-content: space-between; padding: 2px 0; }
.risk-tooltip-text .rtt-label { color: #8b8fa3; }
.risk-tooltip-text .rtt-value { color: #e6edf3; font-weight: 600; }
.risk-tooltip-text .rtt-divider { border-top: 1px solid rgba(255,255,255,0.06); margin: 4px 0; }
</style>
<!-- Stats Summary -->
<div class="stats-grid" style="margin-bottom: 24px;">
    <div class="stat-card">
        <div class="stat-label">Open Positions</div>
        <div class="stat-value warning" id="open-count">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Unrealized P&L</div>
        <div class="stat-value" id="unrealized-pnl">$0.00</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Closed Today</div>
        <div class="stat-value info" id="closed-count">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Realized P&L</div>
        <div class="stat-value" id="realized-pnl">$0.00</div>
    </div>
</div>

<!-- Live Trades Section -->
<div class="table-container">
    <div class="table-header">
        <h3 class="table-title">📈 Trade Monitor</h3>
        <div style="display: flex; gap: 12px; align-items: center;">
            <label style="font-size: 0.875rem; color: var(--text-secondary);">Broker:</label>
            <select id="broker-filter" onchange="onBrokerChange(this.value)" class="form-select" style="min-width: 140px; background-color: #2C2C2E; color: #FFFFFF;">
                <option value="" style="background-color: #2C2C2E; color: #FFFFFF;">All Brokers</option>
                <option value="WEBULL" style="background-color: #2C2C2E; color: #FFFFFF;">Webull LIVE</option>
                <option value="WEBULL_PAPER" style="background-color: #2C2C2E; color: #FFFFFF;">Webull PAPER</option>
                <option value="ALPACA" style="background-color: #2C2C2E; color: #FFFFFF;">Alpaca LIVE</option>
                <option value="ALPACA_PAPER" style="background-color: #2C2C2E; color: #FFFFFF;">Alpaca PAPER</option>
                <option value="IBKR" style="background-color: #2C2C2E; color: #FFFFFF;">IBKR LIVE</option>
                <option value="IBKR_PAPER" style="background-color: #2C2C2E; color: #FFFFFF;">IBKR PAPER</option>
                <option value="TASTYTRADE_LIVE" style="background-color: #2C2C2E; color: #FFFFFF;">Tastytrade LIVE</option>
                <option value="TASTYTRADE_PAPER" style="background-color: #2C2C2E; color: #FFFFFF;">Tastytrade PAPER</option>
                <option value="SCHWAB" style="background-color: #0078d7; color: #FFFFFF;">Charles Schwab</option>
                <option value="ROBINHOOD" style="background-color: #1a2f1a; color: #00c853;">Robinhood (LIVE)</option>
            </select>
            <button onclick="refreshPrices()" class="btn btn-primary btn-small">
                🔄 Refresh Prices
            </button>
        </div>
    </div>
    
    <!-- Tabs -->
    <div class="tabs">
        <button id="tab-live" class="tab active" onclick="switchTab('live')">
            📊 Live Positions
        </button>
        <button id="tab-pending" class="tab" onclick="switchTab('pending')">
            ⏳ Pending Orders
        </button>
        <button id="tab-filled" class="tab" onclick="switchTab('filled')">
            ✅ Filled Orders
        </button>
        <button id="tab-signals" class="tab" onclick="switchTab('signals')">
            📡 Signals
        </button>
        <button id="tab-events" class="tab" onclick="switchTab('events')">
            📋 Event Log
        </button>
    </div>
    
    <!-- Event Log Filter Bar (hidden by default) -->
    <div id="events-filter-bar" style="display: none; padding: 16px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05); gap: 16px; align-items: center; flex-wrap: wrap;">
        <div style="display: flex; gap: 12px; align-items: center;">
            <label style="font-size: 0.875rem; color: var(--text-secondary);">Type:</label>
            <select id="event-type-filter" onchange="loadOrderEvents()"
                    style="padding: 8px 12px; background: #2C2C2E; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; min-width: 160px;">
                <option value="">All Events</option>
                <option value="ORDER_PLACED">Order Placed</option>
                <option value="ORDER_FILLED">Order Filled</option>
                <option value="ORDER_FAILED">Order Failed</option>
                <option value="ORDER_REJECTED">Order Rejected</option>
                <option value="DUPLICATE_BLOCKED">Duplicate Blocked</option>
                <option value="STOP_LOSS">Stop Loss</option>
                <option value="PROFIT_TARGET">Profit Target</option>
                <option value="TRAILING_STOP">Trailing Stop</option>
                <option value="EARLY_TRAILING">Early Trailing</option>
                <option value="GIVEBACK_GUARD">Giveback Guard</option>
                <option value="RETRY_ATTEMPT">Retry Attempt</option>
                <option value="MARKET_ORDER_ESCALATION">Market Escalation</option>
                <option value="CHASER_TRACKING">Chaser Tracking</option>
                <option value="CHASER_REPLACED">Chaser Replaced</option>
            </select>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <label style="font-size: 0.875rem; color: var(--text-secondary);">Severity:</label>
            <select id="event-severity-filter" onchange="loadOrderEvents()"
                    style="padding: 8px 12px; background: #2C2C2E; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; min-width: 120px;">
                <option value="">All</option>
                <option value="critical">Critical</option>
                <option value="warning">Warning</option>
                <option value="info">Info</option>
            </select>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <label style="font-size: 0.875rem; color: var(--text-secondary);">Symbol:</label>
            <input type="text" id="event-symbol-filter" placeholder="e.g. AAPL"

    <!-- Signals Filter Bar (hidden by default) -->
    <div id="signals-filter-bar" style="display: none; padding: 16px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05); gap: 16px; align-items: center; flex-wrap: wrap;">
        <div style="display: flex; gap: 12px; align-items: center;">
            <label style="font-size: 0.875rem; color: var(--text-secondary);">Symbol:</label>
            <input type="text" id="signal-symbol-filter" placeholder="e.g. AAPL, SPY" 
                   style="padding: 8px 12px; background: #2C2C2E; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; min-width: 140px;"
                   onkeyup="debounceSignalFilter()">

                    style="padding: 8px 12px; background: #2C2C2E; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; min-width: 180px;">

        </div>

{% endblock %}

{% block scripts %}
<script>
let currentTab = 'live';
let currentBroker = '';
let allTrades = [];
let currentTrades = [];
let priceRefreshInterval = null;
let isClosingPosition = false;

function onBrokerChange(value) {
    currentBroker = value;
    loadTrades();
}

async function switchTab(tab) {
    console.log('[DEBUG] switchTab called with tab:', tab);
    currentTab = tab;
    
    document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    
    const signalsFilterBar = document.getElementById('signals-filter-bar');
    const eventsFilterBar = document.getElementById('events-filter-bar');
    signalsFilterBar.style.display = 'none';
    eventsFilterBar.style.display = 'none';

    if (tab === 'signals') {
        signalsFilterBar.style.display = 'flex';
        await loadRetentionSettings();
        await loadSignalMessages();
    } else if (tab === 'events') {
        eventsFilterBar.style.display = 'flex';
        await loadOrderEvents();
    } else if (tab === 'filled') {
        console.log('[DEBUG] Loading filled orders from API...');
        await loadFilledOrders();
    } else {
        filterAndDisplayTrades();
    }
}

async function loadFilledOrders() {
    const container = document.getElementById('trades-table-container');
    container.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="spinner" style="margin: 0 auto 20px;"></div><div style="color: var(--text-secondary);">Loading order history...</div></div>';
    
    try {
        const response = await fetch('/api/webull/order-history?count=50&status=Filled');
        const data = await response.json();
        
        if (data.error) {
            container.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--error);">${data.error}</div>`;
            return;
        }
        
        const orders = data.orders || [];
        currentTrades = orders;
        displayFilledOrdersTable(orders);
        
    } catch (error) {
        console.error('Failed to load filled orders:', error);
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--error);">Failed to load order history</div>';
    }
}

function filterAndDisplayTrades() {
    let filteredTrades = [];
    
    if (currentTab === 'live') {
        filteredTrades = allTrades.filter(t => t.status === 'OPEN' || t.source === 'live_brokerage');
    } else if (currentTab === 'pending') {
        filteredTrades = allTrades.filter(t => {
            const fillStatus = t.fill_status || '';
            const status = t.status || '';
            return status === 'PENDING' || 
                   fillStatus === 'Submitted' || 
                   fillStatus === 'Working' ||
                   fillStatus === 'Partially Filled';
        });
    } else if (currentTab === 'filled') {
        return;
    }
    
    currentTrades = filteredTrades;
    displayTradesTable(filteredTrades);
    
    if (currentTab === 'live' && filteredTrades.length > 0) {
        refreshPrices();
    }
}

async function loadTrades() {
    const container = document.getElementById('trades-table-container');
    container.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="spinner" style="margin: 0 auto 20px;"></div><div style="color: var(--text-secondary);">Loading...</div></div>';
    
    try {
        const brokerParam = currentBroker ? `?broker=${currentBroker}` : '';
        const mergedResponse = await fetch(`/api/trades/merged${brokerParam}`).then(r => r.json());
        const trades = mergedResponse.trades || [];
        
        allTrades = trades;
        filterAndDisplayTrades();
        updateSummaryStats();
        
    } catch (error) {
        console.error('Failed to load trades:', error);
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--error);">Failed to load trades</div>';
    }
}

function updateSummaryStats() {
    const openTrades = allTrades.filter(t => t.status === 'OPEN' || t.source === 'live_brokerage');
    const closedTrades = allTrades.filter(t => t.status === 'CLOSED');
    
    let unrealizedPnl = 0;
    openTrades.forEach(t => {
        const entry = parseFloat(t.entry_price) || parseFloat(t.executed_price) || 0;
        const current = parseFloat(t.current_price) || entry;
        const qty = parseInt(t.quantity) || 0;
        const multiplier = t.asset_type === 'option' ? 100 : 1;
        unrealizedPnl += (current - entry) * qty * multiplier;
    });
    
    const realizedPnl = closedTrades.reduce((sum, t) => sum + (parseFloat(t.pnl) || 0), 0);
    
    document.getElementById('open-count').textContent = openTrades.length;
    document.getElementById('closed-count').textContent = closedTrades.length;
    
    const unrealizedEl = document.getElementById('unrealized-pnl');
    unrealizedEl.textContent = `$${unrealizedPnl.toFixed(2)}`;
    unrealizedEl.className = 'stat-value ' + (unrealizedPnl >= 0 ? 'pnl-positive' : 'pnl-negative');
    
    const realizedEl = document.getElementById('realized-pnl');
    realizedEl.textContent = `$${realizedPnl.toFixed(2)}`;
    realizedEl.className = 'stat-value ' + (realizedPnl >= 0 ? 'pnl-positive' : 'pnl-negative');
}

async function refreshPrices() {
    const openTrades = currentTrades.filter(t => t.status === 'OPEN');
    if (openTrades.length === 0) return;
    
    // Prepare positions payload
    const positions = openTrades.map(t => ({
        trade_id: t.id,
        symbol: t.symbol,
        asset_type: t.asset_type,
        strike: t.strike,
        expiry: t.expiry,
        call_put: t.call_put
    }));
    
    try {
        const response = await fetch('/api/trades/realtime-prices', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ positions })
        });
        
        const data = await response.json();
        
        if (data.prices) {
            updatePricesInTable(data.prices);
        }
    } catch (error) {
        console.error('Failed to refresh prices:', error);
    }
}

function updatePricesInTable(prices) {
    for (const [tradeId, priceData] of Object.entries(prices)) {
        const row = document.querySelector(`tr[data-trade-id="${tradeId}"]`);
        if (!row) continue;
        
        // Update bid/ask/mid/last
        const bidCell = row.querySelector('.price-bid');
        const askCell = row.querySelector('.price-ask');
        const midCell = row.querySelector('.price-mid');
        const lastCell = row.querySelector('.price-last');
        
        if (bidCell) bidCell.textContent = `$${priceData.bid.toFixed(2)}`;
        if (askCell) askCell.textContent = `$${priceData.ask.toFixed(2)}`;
        if (midCell) midCell.textContent = `$${priceData.mid.toFixed(2)}`;
        if (lastCell) lastCell.textContent = `$${priceData.last.toFixed(2)}`;
        
        // Calculate and update P&L using mid price
        const trade = currentTrades.find(t => t.id == tradeId);
        if (trade) {
            // Use entry_price for live brokerage positions, executed_price for bot-tracked trades
            const entryPrice = trade.entry_price || trade.executed_price;
            if (entryPrice) {
                const currentPrice = priceData.mid;
                const quantity = trade.quantity;
                
                const pnl = (currentPrice - entryPrice) * quantity * (trade.asset_type === 'option' ? 100 : 1);
                const pnlPercent = ((currentPrice - entryPrice) / entryPrice) * 100;
                
                const pnlCashCell = row.querySelector('.pnl-cash');
                const pnlPercentCell = row.querySelector('.pnl-percent');
                
                if (pnlCashCell) {
                    pnlCashCell.textContent = `$${pnl.toFixed(2)}`;
                    pnlCashCell.className = 'pnl-cash ' + (pnl >= 0 ? 'profit' : 'loss');
                }
                
                if (pnlPercentCell) {
                    pnlPercentCell.textContent = `${pnlPercent.toFixed(1)}%`;
                    pnlPercentCell.className = 'pnl-percent ' + (pnl >= 0 ? 'profit' : 'loss');
                }
            }
        }
    }
}

function displayTradesTable(trades) {
    const container = document.getElementById('trades-table-container');
    
    if (trades.length === 0) {
        container.innerHTML = `
            <div style="text-align: center; padding: 60px 20px;">
                <div style="font-size: 3rem; margin-bottom: 16px; opacity: 0.3;">📊</div>
                <div style="color: var(--text-secondary); font-size: 1rem;">No ${currentTab} trades found</div>
            </div>
        `;
        return;
    }
    
    const isLiveTab = currentTab === 'live';
    let tableHTML = '<table class="data-table"><thead><tr>';
    tableHTML += '<th>Symbol</th><th>Type</th><th>Qty</th><th>Entry</th><th>Current</th><th>P/L</th><th>P/L%</th>';
    if (isLiveTab) tableHTML += '<th style="min-width: 180px;">Risk Engine</th>';
    tableHTML += '<th>Status</th><th>Actions</th>';
    tableHTML += '</tr></thead><tbody>';
    
    trades.forEach(trade => {
        const entry = parseFloat(trade.entry_price) || parseFloat(trade.executed_price) || 0;
        const current = parseFloat(trade.current_price) || entry;
        const qty = parseInt(trade.quantity) || 0;
        const multiplier = trade.asset_type === 'option' ? 100 : 1;
        const pnl = (current - entry) * qty * multiplier;
        const pnlPercent = entry > 0 ? ((current - entry) / entry) * 100 : 0;
        const pnlClass = pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
        
        let symbolDisplay = trade.symbol;
        if (trade.asset_type === 'option' && trade.strike) {
            symbolDisplay += ` ${trade.expiry || ''} $${trade.strike}${trade.call_put || ''}`;
        }
        
        const sourceTag = trade.source === 'live_brokerage' ? '<span class="badge" style="background: #0080ff; margin-left: 4px; font-size: 0.7rem;">LIVE</span>' : '';
        
        tableHTML += `<tr data-trade-id="${trade.id}">
            <td><strong>${symbolDisplay}</strong>${sourceTag}</td>
            <td>${trade.asset_type || 'stock'}</td>
            <td>${qty}</td>
            <td>$${entry.toFixed(2)}</td>
            <td class="price-last">$${current.toFixed(2)}</td>
            <td class="${pnlClass} pnl-cash"><strong>$${pnl.toFixed(2)}</strong></td>
            <td class="${pnlClass} pnl-percent">${pnlPercent.toFixed(1)}%</td>`;
        
        if (isLiveTab) {
            tableHTML += `<td class="risk-status-cell" data-risk-trade-id="${trade.id}">
                <div class="risk-badges">
                    <span class="risk-badge" style="background: rgba(255,255,255,0.03); color: #555; border-color: rgba(255,255,255,0.06); font-size: 9px;">Loading...</span>
                </div>
            </td>`;
        }
        
        tableHTML += `<td><span class="badge">${trade.status || 'UNKNOWN'}</span></td>
            <td>

function displayFilledOrdersTable(orders) {

    tableHTML += '</tr></thead><tbody>';
    
    orders.forEach(order => {
        const qty = parseInt(order.quantity) || 0;
        const filledQty = parseInt(order.filled_quantity) || qty;
        const avgPrice = parseFloat(order.avg_filled_price) || parseFloat(order.limit_price) || 0;

        if (order.asset_type === 'option' && order.strike) {

            '<span style="background: rgba(0,255,136,0.2); color: #0f8; padding: 2px 8px; border-radius: 4px; font-weight: 600;">BUY</span>' : 
            '<span style="background: rgba(255,68,68,0.2); color: #f44; padding: 2px 8px; border-radius: 4px; font-weight: 600;">SELL</span>';
        
        // Parse timestamps as UTC before converting to EST
        const parseAsUTC = (ts) => {
            if (!ts) return null;
            if (!ts.endsWith('Z') && !ts.includes('+') && !ts.includes('-', 10)) {
                ts = ts.replace(' ', 'T') + 'Z';
            }
            return new Date(ts);
        };
        const filledDate = parseAsUTC(order.filled_time) || parseAsUTC(order.created_time);
        const filledTime = filledDate ? filledDate.toLocaleString('en-US', { timeZone: 'America/New_York' }) : 'N/A';
        
        tableHTML += `<tr>
            <td><strong>${symbolDisplay}</strong></td>
            <td>${actionBadge}</td>
            <td>${qty}</td>
            <td>${filledQty}</td>

        </tr>`;
    });
    
    tableHTML += '</tbody></table>';
    container.innerHTML = tableHTML;
}

async function saveRiskSettings(tradeId) {
    const profitTarget = parseFloat(document.getElementById(`profit-${tradeId}`).value);
    const stopLoss = parseFloat(document.getElementById(`stop-${tradeId}`).value);
    const trailingEnabled = document.getElementById(`trailing-${tradeId}`).checked;
    const trailingPct = parseFloat(document.getElementById(`trailing-pct-${tradeId}`).value);
    
    try {
        const response = await fetch(`/api/trades/${tradeId}/risk-settings`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                profit_target: profitTarget,
                stop_loss: stopLoss,
                trailing_stop_enabled: trailingEnabled,
                trailing_stop: trailingPct
            })
        });
        
        const result = await response.json();
        
        if (response.ok) {
            alert(`✅ Risk settings saved!\n\nProfit Target: ${profitTarget}%\nStop Loss: ${stopLoss}%\nTrailing Stop: ${trailingEnabled ? 'ON (' + trailingPct + '%)' : 'OFF'}`);
        } else {
            alert(`❌ Failed to save: ${result.error || 'Unknown error'}`);
        }
    } catch (error) {
        console.error('Failed to save risk settings:', error);
        alert(`❌ Failed to save: ${error.message}`);
    }
}

async function closePosition(evt, tradeId, symbol, maxQuantity, assetType) {
    // Prevent default and stop propagation
    if (evt) {
        evt.preventDefault();
        evt.stopPropagation();
    }
    
    // GLOBAL LOCK: Prevent any close operation if one is already in progress
    if (isClosingPosition) {
        console.log('[CLOSE] Blocked: Another close operation is in progress');
        return;
    }
    
    // Get button and input elements
    const closeBtn = document.getElementById(`close-btn-${tradeId}`);
    const qtyInput = document.getElementById(`qty-${tradeId}`);
    
    if (!qtyInput || !closeBtn) {
        alert('❌ Controls not found');
        return;
    }
    
    // Check if already closing
    if (closeBtn.disabled) {
        return; // Already processing
    }
    
    const qtyToClose = parseInt(qtyInput.value);
    
    if (isNaN(qtyToClose) || qtyToClose <= 0) {
        alert('❌ Invalid quantity. Please enter a positive number.');
        return;
    }
    
    if (qtyToClose > maxQuantity) {
        alert(`❌ Cannot close ${qtyToClose}. You only have ${maxQuantity}.`);
        return;
    }
    
    if (!confirm(`⚠️ Close ${qtyToClose} of ${symbol}?\n\nThis will immediately execute a SELL order.`)) {
        return;
    }

    // SET GLOBAL LOCK before any async operations
    isClosingPosition = true;
    console.log('[CLOSE] Global lock acquired');

    // Disable input and button to prevent duplicate submissions
    const originalText = closeBtn.textContent;
    closeBtn.disabled = true;
    closeBtn.textContent = '⏳ Closing...';
    qtyInput.disabled = true;

    try {
        const response = await fetch(`/api/trades/${tradeId}/close`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                quantity: qtyToClose
            })
        });

        const result = await response.json();

        if (response.ok && result.success) {
            alert(`✅ ${result.message || 'Position closed successfully!'}`);
            if (typeof loadTrades === 'function') {
                loadTrades();
            }
        } else {
            alert(`❌ Failed to close position: ${result.error || 'Unknown error'}`);
            // Re-enable on error
            closeBtn.disabled = false;
            closeBtn.textContent = originalText;
            qtyInput.disabled = false;
        }
    } catch (err) {
        console.error('Error calling closePosition API:', err);
        alert('❌ Network or server error while closing position. Check console/logs.');
        // Re-enable on error
        closeBtn.disabled = false;
        closeBtn.textContent = originalText;
        qtyInput.disabled = false;
    } finally {
        // ALWAYS release global lock
        isClosingPosition = false;
        console.log('[CLOSE] Global lock released');
    }
}

async function cancelOrder(orderId, symbol, broker = null) {
    const brokerName = broker || currentBroker || 'webull';
    const brokerDisplay = brokerName.charAt(0).toUpperCase() + brokerName.slice(1).replace('_paper', ' Paper');
    
    if (!confirm(`⚠️ Cancel pending order for ${symbol}?\n\nOrder ID: ${orderId}\nBroker: ${brokerDisplay}\n\nThis will cancel the order.`)) {
        return;
    }
    
    try {
        // Use unified cancel endpoint for all brokers
        const endpoint = `/api/orders/${encodeURIComponent(brokerName)}/${encodeURIComponent(orderId)}/cancel`;
        
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        
        const result = await response.json();
        
        if (response.ok && result.success) {
            alert(`✅ Order cancelled successfully!\n\nOrder ID: ${orderId}`);
            loadTrades();
        } else if (result.unsupported) {
            alert(`⚠️ ${result.error}`);
        } else {
            alert(`❌ Failed to cancel order: ${result.error || 'Unknown error'}`);
        }
    } catch (error) {
        console.error('Failed to cancel order:', error);
        alert(`❌ Failed to cancel order: ${error.message}`);
    }
}

let signalFilterTimeout = null;

    try {

        if (data.retention_days) {

async function updateRetentionDays() {

    try {
        const response = await fetch('/api/channel-messages/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },

async function loadSignalMessages() {
    const container = document.getElementById('trades-table-container');
    container.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="spinner" style="margin: 0 auto 20px;"></div><div style="color: var(--text-secondary);">Loading signals...</div></div>';
    
    try {
        const symbolFilter = document.getElementById('signal-symbol-filter').value.trim();
        const channelFilter = document.getElementById('signal-channel-filter').value;
        
        let url = '/api/channel-messages?limit=200';
        if (symbolFilter) url += `&symbol=${encodeURIComponent(symbolFilter)}`;
        if (channelFilter) url += `&channel_id=${encodeURIComponent(channelFilter)}`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.error) {
            container.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--error);">${data.error}</div>`;
            return;
        }
        
        // Populate channel dropdown if not done
        if (!signalChannelsLoaded && data.channels && data.channels.length > 0) {
            const channelSelect = document.getElementById('signal-channel-filter');
            data.channels.forEach(ch => {
                const option = document.createElement('option');
                option.value = ch.id;
                option.textContent = ch.name;
                channelSelect.appendChild(option);
            });
            signalChannelsLoaded = true;
        }
        
        displaySignalMessagesTable(data.messages || []);
        
    } catch (error) {
        console.error('Failed to load signal messages:', error);
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--error);">Failed to load signals</div>';
    }
}

                </td>
                <td style="font-weight: 600; color: #00F5FF;">${symbol || '-'}</td>
                <td class="${dirClass}" style="font-weight: 600;">${direction.toUpperCase()}</td>
                <td style="font-size: 0.8rem; color: var(--text-secondary);">${details}</td>
                <td style="font-size: 0.8rem; color: #aaa; max-width: 300px; overflow: hidden; text-overflow: ellipsis;" title="${msg.message_content || ''}">${messagePreview}</td>
            </tr>
        `;
    }
    
    html += '</tbody></table>';
    
    html += `<div style="padding: 12px 16px; text-align: right; color: var(--text-secondary); font-size: 0.8rem;">
        Showing ${messages.length} signal${messages.length !== 1 ? 's' : ''}
    </div>`;
    
    container.innerHTML = html;
}

let previousRiskStates = {};
let riskPollInterval = null;

function buildRiskBadges(rs) {
    if (!rs || !rs.monitoring) return '<span style="color:#555; font-size: 10px;">Not Monitored</span>';
    let badges = [];
    
    badges.push(`<span class="risk-badge rb-monitoring"><span class="rb-dot"></span>ACTIVE</span>`);
    
    if (rs.closing) {
        badges.push(`<span class="risk-badge rb-closing"><span class="rb-dot"></span>CLOSING</span>`);
    }
    
    if (rs.stop_loss_active) {
        badges.push(`<span class="risk-badge rb-sl" title="SL @ $${rs.stop_loss_price ? rs.stop_loss_price.toFixed(2) : '?'}">🛑 SL</span>`);
    }
    
    if (rs.profit_target_active) {
        const ptLabel = rs.tiers_hit && rs.tiers_hit.length > 0 ? `PT${rs.tiers_hit[rs.tiers_hit.length-1]}✓` : 'PT';
        const ptClass = rs.tiers_hit && rs.tiers_hit.length > 0 ? 'rb-pt-hit' : 'rb-pt';
        badges.push(`<span class="risk-badge ${ptClass}" title="Target @ $${rs.profit_target_price ? rs.profit_target_price.toFixed(2) : '?'}">🎯 ${ptLabel}</span>`);
    }
    
    if (rs.dynamic_sl_enabled && rs.dynamic_sl_price) {
        badges.push(`<span class="risk-badge rb-dynamic-sl" title="Dynamic SL escalated to $${rs.dynamic_sl_price.toFixed(2)}">📊 DSL $${rs.dynamic_sl_price.toFixed(2)}</span>`);
    }
    
    if (rs.trailing_enabled) {
        if (rs.trailing_activated) {
            const tsp = rs.trailing_stop_price ? `$${rs.trailing_stop_price.toFixed(2)}` : '...';
            badges.push(`<span class="risk-badge rb-trail-active"><span class="rb-dot"></span>TRAIL ${tsp}</span>`);
        } else {
            badges.push(`<span class="risk-badge rb-trail-ready">📉 Trail</span>`);
        }
    }
    
    if (rs.early_trail_enabled) {
        if (rs.early_trailing_active) {
            const steps = rs.early_steps_locked || 0;
            if (steps > 0) {
                const esp = rs.early_stop_price ? `$${rs.early_stop_price.toFixed(2)}` : '';
                badges.push(`<span class="risk-badge rb-early-profit"><span class="rb-dot"></span>PROFIT LOCKED ×${steps} ${esp}</span>`);
            } else {
                badges.push(`<span class="risk-badge rb-early-breakeven"><span class="rb-dot"></span>BREAKEVEN</span>`);
            }
        } else {
            const actPct = rs.early_activation_pct ? `@${rs.early_activation_pct}%` : '';
            badges.push(`<span class="risk-badge rb-early-ready">⚡ Early ${actPct}</span>`);
        }
    }
    
    if (rs.giveback_enabled) {
        if (rs.giveback_guard_active) {
            const gbPct = rs.giveback_allowed_pct ? `${rs.giveback_allowed_pct}%` : '';
            badges.push(`<span class="risk-badge rb-giveback-armed"><span class="rb-dot"></span>GIVEBACK ARMED ${gbPct}</span>`);
        } else {
            badges.push(`<span class="risk-badge rb-giveback-ready">🛡️ Giveback</span>`);
        }
    }
    
    if (rs.max_pnl_seen > 0) {
        badges.push(`<span class="risk-badge" style="background:rgba(255,255,255,0.03); color:#6b7280; border-color:rgba(255,255,255,0.06); font-size:9px;" title="Peak P&L seen">Peak: +${rs.max_pnl_seen.toFixed(1)}%</span>`);
    }
    
    return badges.join('');
}

function buildRiskTooltip(rs) {
    if (!rs) return '';
    let rows = '';
    rows += `<div class="rtt-row"><span class="rtt-label">Entry</span><span class="rtt-value">$${rs.entry_price ? rs.entry_price.toFixed(2) : '?'}</span></div>`;
    if (rs.current_price) rows += `<div class="rtt-row"><span class="rtt-label">Current</span><span class="rtt-value">$${rs.current_price.toFixed(2)}</span></div>`;
    rows += `<div class="rtt-row"><span class="rtt-label">P&L</span><span class="rtt-value" style="color:${rs.current_pnl_pct >= 0 ? '#30d158' : '#ff3b30'}">${rs.current_pnl_pct >= 0 ? '+' : ''}${rs.current_pnl_pct}%</span></div>`;
    if (rs.max_pnl_seen > 0) rows += `<div class="rtt-row"><span class="rtt-label">Peak P&L</span><span class="rtt-value" style="color:#30d158">+${rs.max_pnl_seen.toFixed(1)}%</span></div>`;
    rows += '<div class="rtt-divider"></div>';
    if (rs.stop_loss_price) rows += `<div class="rtt-row"><span class="rtt-label">🛑 Stop Loss</span><span class="rtt-value">$${rs.stop_loss_price.toFixed(2)}</span></div>`;
    if (rs.profit_target_price) rows += `<div class="rtt-row"><span class="rtt-label">🎯 Profit Target</span><span class="rtt-value">$${rs.profit_target_price.toFixed(2)}</span></div>`;
    if (rs.dynamic_sl_price) rows += `<div class="rtt-row"><span class="rtt-label">📊 Dynamic SL</span><span class="rtt-value">$${rs.dynamic_sl_price.toFixed(2)}</span></div>`;
    if (rs.trailing_stop_price) rows += `<div class="rtt-row"><span class="rtt-label">📉 Trail Stop</span><span class="rtt-value">$${rs.trailing_stop_price.toFixed(2)}</span></div>`;
    if (rs.early_stop_price) rows += `<div class="rtt-row"><span class="rtt-label">⚡ Early Stop</span><span class="rtt-value">$${rs.early_stop_price.toFixed(2)}</span></div>`;
    if (rs.tiers_hit && rs.tiers_hit.length > 0) rows += `<div class="rtt-row"><span class="rtt-label">Tiers Hit</span><span class="rtt-value">${rs.tiers_hit.map(t => 'PT'+t).join(', ')}</span></div>`;
    if (rs.highest_price) rows += `<div class="rtt-row"><span class="rtt-label">Highest</span><span class="rtt-value">$${rs.highest_price.toFixed(2)}</span></div>`;
    return rows;
}

async function fetchAndRenderRiskStatus() {
    try {
        const response = await fetch('/api/risk-status');
        const data = await response.json();
        if (!data.success) return;
        
        const states = data.risk_states || {};
        
        document.querySelectorAll('.risk-status-cell').forEach(cell => {
            const tradeId = cell.getAttribute('data-risk-trade-id');
            const rs = states[tradeId];
            const badgesHTML = buildRiskBadges(rs);
            const tooltipHTML = rs ? buildRiskTooltip(rs) : '';
            
            if (rs && tooltipHTML) {
                cell.innerHTML = `<div class="risk-tooltip"><div class="risk-badges">${badgesHTML}</div><div class="risk-tooltip-text">${tooltipHTML}</div></div>`;
            } else {
                cell.innerHTML = `<div class="risk-badges">${badgesHTML}</div>`;
            }
        });
        
        detectRiskStateChanges(states);
        previousRiskStates = JSON.parse(JSON.stringify(states));
        
    } catch (error) {
        console.error('[RISK-UI] Failed to fetch risk status:', error);
    }
}

function detectRiskStateChanges(newStates) {
    if (!window.NotificationSystem || !window.NotificationSystem.showToast) return;
    if (Object.keys(previousRiskStates).length === 0) return;
    
    for (const [tradeId, ns] of Object.entries(newStates)) {
        const ps = previousRiskStates[tradeId];
        if (!ps) {
            showRiskToast('risk_monitoring', `Risk Engine Active`, `Position ${ns.position_key ? ns.position_key.split('_')[1] : tradeId} is now being monitored by the risk engine.`, tradeId);
            continue;
        }
        
        const sym = ns.position_key ? ns.position_key.split('_')[1] : tradeId;
        
        if (ns.early_trailing_active && !ps.early_trailing_active) {
            showRiskToast('early_trailing', `Breakeven Locked: ${sym}`, `Early trailing activated — stop moved to entry price. Position is now risk-free.`, tradeId);
        }
        
        if ((ns.early_steps_locked || 0) > (ps.early_steps_locked || 0)) {
            const stopPrice = ns.early_stop_price ? `$${ns.early_stop_price.toFixed(2)}` : '';
            showRiskToast('profit_locked', `Profit Locked: ${sym}`, `Step ${ns.early_steps_locked} locked — trailing stop raised to ${stopPrice}`, tradeId);
        }
        
        if (ns.giveback_guard_active && !ps.giveback_guard_active) {
            showRiskToast('giveback_guard', `Giveback Guard Armed: ${sym}`, `Max profit reached +${ns.max_pnl_seen.toFixed(1)}%. Guard will exit if price gives back ${ns.giveback_allowed_pct || 30}%.`, tradeId);
        }
        
        if (ns.trailing_activated && !ps.trailing_activated) {
            const tsp = ns.trailing_stop_price ? `$${ns.trailing_stop_price.toFixed(2)}` : '';
            showRiskToast('trailing_stop', `Trailing Stop Active: ${sym}`, `Legacy trailing stop now tracking. Current stop: ${tsp}`, tradeId);
        }
        
        if (ns.tiers_hit && ps.tiers_hit && ns.tiers_hit.length > ps.tiers_hit.length) {
            const newTier = ns.tiers_hit[ns.tiers_hit.length - 1];
            showRiskToast('profit_target', `PT${newTier} Hit: ${sym}`, `Profit target tier ${newTier} reached! Partial exit executed.`, tradeId);
        }
        
        if (ns.dynamic_sl_price && (!ps.dynamic_sl_price || ns.dynamic_sl_price > ps.dynamic_sl_price)) {
            showRiskToast('dynamic_sl', `SL Escalated: ${sym}`, `Dynamic stop loss raised to $${ns.dynamic_sl_price.toFixed(2)}`, tradeId);
        }
        
        if (ns.closing && !ps.closing) {
            showRiskToast('position_closing', `Closing: ${sym}`, `Risk engine is closing this position.`, tradeId);
        }
    }
}

function showRiskToast(type, title, message, tradeId) {
    const configs = {
        risk_monitoring: { icon: '🔍', color: '#00f5ff', label: 'RISK ENGINE', accent: 'rgba(0,245,255,0.12)', border: 'rgba(0,245,255,0.3)' },
        early_trailing: { icon: '⚡', color: '#06b6d4', label: 'BREAKEVEN', accent: 'rgba(6,182,212,0.12)', border: 'rgba(6,182,212,0.35)' },
        profit_locked: { icon: '🔒', color: '#22c55e', label: 'PROFIT LOCK', accent: 'rgba(34,197,94,0.12)', border: 'rgba(34,197,94,0.35)' },
        giveback_guard: { icon: '🛡️', color: '#fbbf24', label: 'GIVEBACK', accent: 'rgba(251,191,36,0.12)', border: 'rgba(251,191,36,0.35)' },
        trailing_stop: { icon: '📉', color: '#af82ff', label: 'TRAILING', accent: 'rgba(175,130,255,0.12)', border: 'rgba(175,130,255,0.35)' },
        profit_target: { icon: '🎯', color: '#30d158', label: 'TARGET HIT', accent: 'rgba(48,209,88,0.12)', border: 'rgba(48,209,88,0.35)' },
        dynamic_sl: { icon: '📊', color: '#ff9500', label: 'SL ESCALATED', accent: 'rgba(255,149,0,0.12)', border: 'rgba(255,149,0,0.35)' },
        position_closing: { icon: '🚪', color: '#ff3b30', label: 'CLOSING', accent: 'rgba(255,59,48,0.12)', border: 'rgba(255,59,48,0.35)' }
    };
    
    const cfg = configs[type] || configs.risk_monitoring;
    
    NotificationSystem.showToast({
        type: type,
        title: title,
        message: message,
        timestamp: new Date().toLocaleTimeString(),
        broker: '',
        datetime: `risk_${type}_${tradeId}_${Date.now()}`
    });
}

// Load trades initially
loadTrades();

// Auto-refresh prices every 10 seconds for open positions
priceRefreshInterval = setInterval(() => {
    if (currentTrades.filter(t => t.status === 'OPEN').length > 0) {
        refreshPrices();
    }
}, 10000);

riskPollInterval = setInterval(() => {
    if (currentTab === 'live' && currentTrades.filter(t => t.status === 'OPEN').length > 0) {
        fetchAndRenderRiskStatus();
    }
}, 5000);

// Clean up intervals on page unload
window.addEventListener('beforeunload', () => {
    if (priceRefreshInterval) clearInterval(priceRefreshInterval);
    if (riskPollInterval) clearInterval(riskPollInterval);
});

let eventFilterTimeout = null;
let eventCurrentPage = 0;
const EVENT_PAGE_SIZE = 50;

function debounceEventFilter() {
    if (eventFilterTimeout) clearTimeout(eventFilterTimeout);
    eventFilterTimeout = setTimeout(() => loadOrderEvents(), 400);
}

async function loadOrderEvents(page = 0) {
    eventCurrentPage = page;
    const container = document.getElementById('trades-table-container');
    container.innerHTML = '<div style="text-align: center; padding: 40px;"><div class="spinner" style="margin: 0 auto 20px;"></div><div style="color: var(--text-secondary);">Loading events...</div></div>';

    try {
        const eventType = document.getElementById('event-type-filter').value;
        const severity = document.getElementById('event-severity-filter').value;
        const symbol = document.getElementById('event-symbol-filter').value.trim();

        let url = `/api/order-events?limit=${EVENT_PAGE_SIZE}&offset=${page * EVENT_PAGE_SIZE}`;
        if (eventType) url += `&event_type=${encodeURIComponent(eventType)}`;
        if (severity) url += `&severity=${encodeURIComponent(severity)}`;
        if (symbol) url += `&symbol=${encodeURIComponent(symbol)}`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.success) {
            container.innerHTML = `<div style="text-align: center; padding: 40px; color: var(--error);">${data.error}</div>`;
            return;
        }

        displayOrderEventsTable(data.events || [], data.total || 0);
    } catch (error) {
        console.error('Failed to load order events:', error);
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--error);">Failed to load event log</div>';
    }
}

function getEventIcon(eventType) {
    const icons = {
        'ORDER_PLACED': '📤', 'ORDER_FILLED': '✅', 'ORDER_FAILED': '❌',
        'ORDER_REJECTED': '🚫', 'DUPLICATE_BLOCKED': '🔒',
        'STOP_LOSS': '🛑', 'PROFIT_TARGET': '🎯', 'TRAILING_STOP': '📉',
        'EARLY_TRAILING': '⚡', 'GIVEBACK_GUARD': '🛡️',
        'RETRY_ATTEMPT': '🔄', 'MARKET_ORDER_ESCALATION': '⬆️',
        'CHASER_TRACKING': '👁️', 'CHASER_REPLACED': '🔀',
        'EXIT_TRIGGERED': '🚪'
    };
    return icons[eventType] || '📋';
}

function getSeverityBadge(severity) {
    const colors = {
        'critical': 'background: rgba(255,59,48,0.2); color: #ff3b30; border: 1px solid rgba(255,59,48,0.3);',
        'warning': 'background: rgba(255,159,10,0.2); color: #ff9f0a; border: 1px solid rgba(255,159,10,0.3);',
        'info': 'background: rgba(10,132,255,0.2); color: #0a84ff; border: 1px solid rgba(10,132,255,0.3);'
    };
    const style = colors[severity] || colors['info'];
    return `<span style="${style} padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;">${severity}</span>`;
}

function displayOrderEventsTable(events, total) {
    const container = document.getElementById('trades-table-container');

    if (events.length === 0) {
        container.innerHTML = `
            <div style="text-align: center; padding: 60px 20px;">
                <div style="font-size: 48px; margin-bottom: 16px;">📋</div>
                <div style="font-size: 1.125rem; color: var(--text-primary); margin-bottom: 8px;">No Events Found</div>
                <div style="color: var(--text-secondary); font-size: 0.875rem;">
                    Order events will appear here as trades are executed.<br>
                    Events track order placements, fills, risk triggers, and more.
                </div>
            </div>
        `;
        return;
    }

    let html = `
        <div style="padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05);">
            <span style="color: var(--text-secondary); font-size: 0.8125rem;">${total} total events</span>
            <div style="display: flex; gap: 8px;">
    `;
    const totalPages = Math.ceil(total / EVENT_PAGE_SIZE);
    if (eventCurrentPage > 0) {
        html += `<button onclick="loadOrderEvents(${eventCurrentPage - 1})" class="btn btn-small" style="background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.1);">← Prev</button>`;
    }
    html += `<span style="color: var(--text-secondary); font-size: 0.8125rem; padding: 6px 8px;">Page ${eventCurrentPage + 1}/${totalPages}</span>`;
    if (eventCurrentPage < totalPages - 1) {
        html += `<button onclick="loadOrderEvents(${eventCurrentPage + 1})" class="btn btn-small" style="background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.1);">Next →</button>`;
    }
    html += `</div></div>`;

    html += `
        <table class="data-table">
            <thead>
                <tr>
                    <th style="width: 140px;">Time</th>
                    <th style="width: 50px;"></th>
                    <th>Event</th>
                    <th>Symbol</th>
                    <th>Broker</th>
                    <th>Dir</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Severity</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
    `;

    for (const evt of events) {
        let ts = evt.timestamp;
        if (ts && !ts.endsWith('Z') && !ts.includes('+') && !ts.includes('-', 10)) {
            ts = ts.replace(' ', 'T') + 'Z';
        }
        const time = ts ? new Date(ts).toLocaleString('en-US', { timeZone: 'America/New_York', hour12: true, month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';

        const icon = getEventIcon(evt.event_type);
        const typeLabel = (evt.event_type || '').replace(/_/g, ' ');
        const dirColor = evt.direction === 'BTO' ? '#30d158' : evt.direction === 'STC' ? '#ff453a' : '#fff';
        const priceStr = evt.price ? `$${parseFloat(evt.price).toFixed(2)}` : '-';
        const qtyStr = evt.quantity || '-';
        const reasonStr = evt.reason || '';
        const detailsStr = evt.details || '';
        const combinedDetails = [reasonStr, detailsStr].filter(Boolean).join(' | ');

        html += `
            <tr style="border-bottom: 1px solid rgba(255,255,255,0.04);">
                <td style="font-size: 0.8125rem; color: var(--text-secondary); white-space: nowrap;">${time}</td>
                <td style="font-size: 1.1rem; text-align: center;">${icon}</td>
                <td style="font-size: 0.8125rem; font-weight: 600;">${typeLabel}</td>
                <td style="font-weight: 600; color: #0a84ff;">${evt.symbol || '-'}</td>
                <td style="font-size: 0.8125rem;">${evt.broker || '-'}</td>
                <td style="font-weight: 600; color: ${dirColor};">${evt.direction || '-'}</td>
                <td>${qtyStr}</td>
                <td>${priceStr}</td>
                <td>${getSeverityBadge(evt.severity || 'info')}</td>
                <td style="font-size: 0.8125rem; color: var(--text-secondary); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${combinedDetails}">${combinedDetails || '-'}</td>
            </tr>
        `;
    }

    html += '</tbody></table>';
    container.innerHTML = html;
}

async function clearOrderEvents() {
    if (!confirm('Clear all order events? This cannot be undone.')) return;
    try {
        const response = await fetch('/api/order-events/clear', { method: 'POST' });
        const data = await response.json();
        if (data.success) {
            loadOrderEvents();
        }
    } catch (error) {
        console.error('Failed to clear events:', error);
    }
}
</script>
