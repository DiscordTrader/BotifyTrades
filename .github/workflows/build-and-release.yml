name: Build and Release to Public Repo

on:
  push:
    tags:
      - 'v*'

env:
  PUBLIC_REPO: DiscordTrader/BotifyTrades
  
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor pyinstaller certifi
          pip install -r requirements.txt

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Backup license files
        run: |
          mkdir -p backup
          copy license\config\constants.py backup\constants.py.bak
          copy license\client\manager_secure.py backup\manager_secure.py.bak
          copy license\client\manager_activation.py backup\manager_activation.py.bak

      - name: Obfuscate with PyArmor
        run: |
          pyarmor gen -O dist_obf license\config\constants.py
          pyarmor gen -O dist_obf license\client\manager_secure.py
          pyarmor gen -O dist_obf license\client\manager_activation.py
          copy /Y dist_obf\constants.py license\config\constants.py
          copy /Y dist_obf\manager_secure.py license\client\manager_secure.py
          copy /Y dist_obf\manager_activation.py license\client\manager_activation.py
          if exist dist_obf\pyarmor_runtime_000000 xcopy /s /y /q dist_obf\pyarmor_runtime_000000 license\pyarmor_runtime_000000\

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --clean --noconfirm ^
            --distpath packaging\windows\dist ^
            --workpath packaging\windows\build_temp ^
            packaging\windows\specs\botifytrades.spec

      - name: Create distribution package
        run: |
          mkdir packaging\windows\dist\config
          if exist config.ini.example copy config.ini.example packaging\windows\dist\
          if exist GET_DISCORD_TOKEN.html copy GET_DISCORD_TOKEN.html packaging\windows\dist\
          if exist GET_WEBULL_TOKENS.html copy GET_WEBULL_TOKENS.html packaging\windows\dist\
          echo @echo off > packaging\windows\dist\RUN.bat
          echo echo Starting BotifyTrades... >> packaging\windows\dist\RUN.bat
          echo BotifyTrades.exe >> packaging\windows\dist\RUN.bat

      - name: Create README
        run: |
          echo BotifyTrades ${{ steps.version.outputs.VERSION }} > packaging\windows\dist\README.txt
          echo ================================= >> packaging\windows\dist\README.txt
          echo. >> packaging\windows\dist\README.txt
          echo 1. Run RUN.bat or BotifyTrades.exe >> packaging\windows\dist\README.txt
          echo 2. Open http://localhost:5000 >> packaging\windows\dist\README.txt
          echo 3. Complete the setup wizard >> packaging\windows\dist\README.txt

      - name: Zip distribution
        run: |
          cd packaging\windows\dist
          Compress-Archive -Path * -DestinationPath ..\BotifyTrades-${{ steps.version.outputs.VERSION }}-Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: packaging/windows/BotifyTrades-${{ steps.version.outputs.VERSION }}-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor pyinstaller certifi
          pip install -r requirements.txt

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Backup license files
        run: |
          mkdir -p backup
          cp license/config/constants.py backup/constants.py.bak
          cp license/client/manager_secure.py backup/manager_secure.py.bak
          cp license/client/manager_activation.py backup/manager_activation.py.bak

      - name: Obfuscate with PyArmor
        run: |
          pyarmor gen -O dist_obf license/config/constants.py
          pyarmor gen -O dist_obf license/client/manager_secure.py
          pyarmor gen -O dist_obf license/client/manager_activation.py
          cp -f dist_obf/constants.py license/config/constants.py
          cp -f dist_obf/manager_secure.py license/client/manager_secure.py
          cp -f dist_obf/manager_activation.py license/client/manager_activation.py
          mkdir -p license/pyarmor_runtime_000000
          cp -r dist_obf/pyarmor_runtime_000000/* license/pyarmor_runtime_000000/ 2>/dev/null || true

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm \
            --distpath packaging/linux/dist \
            --workpath packaging/linux/build_temp \
            packaging/linux/specs/botifytrades.spec

      - name: Create distribution package
        run: |
          chmod +x packaging/linux/dist/BotifyTrades
          mkdir -p packaging/linux/dist/config
          cp config.ini.example packaging/linux/dist/ 2>/dev/null || true
          cp GET_DISCORD_TOKEN.html packaging/linux/dist/ 2>/dev/null || true
          cp GET_WEBULL_TOKENS.html packaging/linux/dist/ 2>/dev/null || true
          echo '#!/bin/bash' > packaging/linux/dist/run.sh
          echo 'echo "Starting BotifyTrades..."' >> packaging/linux/dist/run.sh
          echo './BotifyTrades' >> packaging/linux/dist/run.sh
          chmod +x packaging/linux/dist/run.sh

      - name: Create tarball
        run: |
          cd packaging/linux/dist
          tar -czvf ../BotifyTrades-${{ steps.version.outputs.VERSION }}-Linux.tar.gz *

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: packaging/linux/BotifyTrades-${{ steps.version.outputs.VERSION }}-Linux.tar.gz

  release-to-public:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: ./artifacts

      - name: List artifacts
        run: ls -la ./artifacts

      - name: Create Release on Public Repo
        uses: softprops/action-gh-release@v1
        with:
          repository: ${{ env.PUBLIC_REPO }}
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: BotifyTrades ${{ steps.version.outputs.VERSION }}
          body: |
            ## BotifyTrades ${{ steps.version.outputs.VERSION }}
            
            ### Downloads
            - **Windows**: `BotifyTrades-${{ steps.version.outputs.VERSION }}-Windows.zip`
            - **Linux**: `BotifyTrades-${{ steps.version.outputs.VERSION }}-Linux.tar.gz`
            
            ### Quick Start
            1. Download and extract for your platform
            2. Run `BotifyTrades.exe` (Windows) or `./BotifyTrades` (Linux)
            3. Open http://localhost:5000 in your browser
            4. Complete the setup wizard
            
            ### Requirements
            - Valid license key
            - Discord account
            - Broker account (Webull, Alpaca, or IBKR)
          files: |
            ./artifacts/BotifyTrades-${{ steps.version.outputs.VERSION }}-Windows.zip
            ./artifacts/BotifyTrades-${{ steps.version.outputs.VERSION }}-Linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
