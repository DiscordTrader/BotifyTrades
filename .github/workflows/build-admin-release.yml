name: Build Admin Release

on:
  repository_dispatch:
    types: [admin_release_ready]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 3.2.7)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --name BotifyTrades-Admin-Windows  --add-data "gui_app/templates;gui_app/templates" --add-data "gui_app/static;gui_app/static" src/selfbot_webull.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BotifyTrades-Admin-Windows
          path: dist/BotifyTrades-Admin-Windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS executable
        run: |
          pyinstaller --onefile --name BotifyTrades-Admin-macOS --add-data "gui_app/templates:gui_app/templates" --add-data "gui_app/static:gui_app/static" src/selfbot_webull.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BotifyTrades-Admin-macOS
          path: dist/BotifyTrades-Admin-macOS

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller --onefile --name BotifyTrades-Admin-Linux --add-data "gui_app/templates:gui_app/templates" --add-data "gui_app/static:gui_app/static" src/selfbot_webull.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: BotifyTrades-Admin-Linux
          path: dist/BotifyTrades-Admin-Linux

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-admin
          name: "BotifyTrades Admin v${{ steps.version.outputs.version }}"
          body: |
            ## Admin Build v${{ steps.version.outputs.version }}
            
            **This is an ADMIN build with full features.**
            
            ### Downloads
            - **Windows**: BotifyTrades-Admin-Windows.exe
            - **macOS**: BotifyTrades-Admin-macOS
            - **Linux**: BotifyTrades-Admin-Linux
            
            ### Admin Features Included
            - Channel Mappings (dual-action execute + forward)
            - Debug tools
            - Full broker management
            - All analytics features
          draft: false
          prerelease: false
          files: |
            artifacts/BotifyTrades-Admin-Windows/BotifyTrades-Admin-Windows.exe
            artifacts/BotifyTrades-Admin-macOS/BotifyTrades-Admin-macOS
            artifacts/BotifyTrades-Admin-Linux/BotifyTrades-Admin-Linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
