      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: BotifyTrades-Admin-Linux
          path: dist/BotifyTrades-Admin-Linux

  create-release:
    needs: [build-windows, build-macos-intel, build-macos-arm, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-admin
          name: BotifyTrades Admin v${{ steps.version.outputs.version }}
          body: |
            ## Admin Build v${{ steps.version.outputs.version }}

            **This is an ADMIN build with full features.**

            ### Downloads
            - **Windows**: BotifyTrades-Admin-Windows.exe
            - **macOS Intel**: BotifyTrades-Admin-macOS-Intel
            - **macOS Apple Silicon**: BotifyTrades-Admin-macOS-ARM
            - **Linux**: BotifyTrades-Admin-Linux

            ### Admin Features Included
            - Channel Mappings (dual-action execute + forward)
            - Debug tools
            - Full broker management
            - All analytics features
          draft: false
          prerelease: false
          files: |
            artifacts/BotifyTrades-Admin-Windows/BotifyTrades-Admin-Windows.exe
            artifacts/BotifyTrades-Admin-macOS-Intel/BotifyTrades-Admin-macOS-Intel
            artifacts/BotifyTrades-Admin-macOS-ARM/BotifyTrades-Admin-macOS-ARM
            artifacts/BotifyTrades-Admin-Linux/BotifyTrades-Admin-Linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
