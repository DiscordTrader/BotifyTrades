name: Build Protected Executables

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor pyinstaller
          pip install -r requirements.txt
      
      - name: Restore PyArmor License
        shell: powershell
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.PYARMOR_LICENSE }}")
          [IO.File]::WriteAllBytes("pyarmor-regfile.zip", $bytes)
          pyarmor reg pyarmor-regfile.zip
          Remove-Item pyarmor-regfile.zip
          pyarmor -v
      
      - name: Obfuscate source code
        run: |
          chcp 65001
          $env:PYTHONIOENCODING = "utf-8"
          pyarmor gen --output obfuscated src/
      
      - name: Build with PyInstaller
        run: |
          Copy-Item -Path src -Destination src_backup -Recurse
          Copy-Item -Path obfuscated/src/* -Destination src/ -Recurse -Force
          pyinstaller build/build_exe.spec --clean --noconfirm
          Remove-Item -Path src -Recurse -Force
          Move-Item -Path src_backup -Destination src
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BotifyTrades-Windows
          path: dist/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor pyinstaller
          pip install -r requirements.txt
      
      - name: Restore PyArmor License
        run: |
          echo "${{ secrets.PYARMOR_LICENSE }}" | base64 -d > pyarmor-regfile.zip
          pyarmor reg pyarmor-regfile.zip
          rm pyarmor-regfile.zip
          pyarmor -v
      
      - name: Obfuscate source code
        run: |
          pyarmor gen --output obfuscated src/
      
      - name: Build with PyInstaller
        run: |
          cp -r src src_backup
          cp -r obfuscated/src/* src/
          pyinstaller build/build_exe.spec --clean --noconfirm
          rm -rf src
          mv src_backup src
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: BotifyTrades-Linux
          path: dist/
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor pyinstaller
          pip install -r requirements.txt
      
      - name: Restore PyArmor License
        run: |
          echo "${{ secrets.PYARMOR_LICENSE }}" | base64 -d > pyarmor-regfile.zip
          pyarmor reg pyarmor-regfile.zip
          rm pyarmor-regfile.zip
          pyarmor -v
      
      - name: Obfuscate source code
        run: |
          pyarmor gen --output obfuscated src/
      
      - name: Build with PyInstaller
        run: |
          cp -r src src_backup
          cp -r obfuscated/src/* src/
          pyinstaller build/build_exe.spec --clean --noconfirm
          rm -rf src
          mv src_backup src
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BotifyTrades-macOS
          path: dist/
          retention-days: 30
