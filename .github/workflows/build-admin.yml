name: Build Admin (Private)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 3.2.1)'
        required: true
        type: string
  repository_dispatch:
    types: [admin_release_ready]

env:
  VERSION: ${{ github.event.inputs.version || github.event.client_payload.version }}

jobs:
  set-build-type:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set BUILD_TYPE to ADMIN
        run: |
          sed -i "s/^BUILD_TYPE = .*/BUILD_TYPE = 'ADMIN'  # Set by release.sh/" src/selfbot_webull.py
          cat src/selfbot_webull.py | grep BUILD_TYPE
          echo "BUILD_TYPE = 'ADMIN'" > gui_app/build_info.py
          cat gui_app/build_info.py
      
      - name: Update version
        run: |
          BUILD_DATE=$(date +%Y-%m-%d)
          sed -i "s/APP_VERSION = \"[^\"]*\"/APP_VERSION = \"${{ env.VERSION }}\"/" upgrade/version.py
          sed -i "s/BUILD_DATE = \"[^\"]*\"/BUILD_DATE = \"$BUILD_DATE\"/" upgrade/version.py
      
      - name: Upload modified source
        uses: actions/upload-artifact@v4
        with:
          name: source-admin
          path: .
          retention-days: 1

  build-windows:
    needs: set-build-type
    runs-on: windows-latest
    
    steps:
      - name: Download modified source
        uses: actions/download-artifact@v4
        with:
          name: source-admin
          path: .
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor pyinstaller
          pip install -r requirements.txt
      
      - name: Restore PyArmor License
        shell: powershell
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.PYARMOR_LICENSE }}")
          [IO.File]::WriteAllBytes("pyarmor-regfile.zip", $bytes)
          pyarmor reg pyarmor-regfile.zip
          Remove-Item pyarmor-regfile.zip
          pyarmor -v
      
      - name: Obfuscate source code
        shell: powershell
        run: |
          chcp 65001
          $env:PYTHONIOENCODING = "utf-8"
          pyarmor gen --output obfuscated src/
          
          # Debug: Show what PyArmor created
          Write-Host "=== PyArmor output structure ==="
          Get-ChildItem -Path obfuscated -Recurse | Select-Object FullName
      
      - name: Build with PyInstaller
        shell: powershell
        run: |
          Copy-Item -Path src -Destination src_backup -Recurse
          Copy-Item -Path obfuscated/src/* -Destination src/ -Recurse -Force
          
          # Critical: Copy PyArmor runtime module to src/ directory
          Get-ChildItem -Path obfuscated -Directory -Filter "pyarmor_runtime_*" | ForEach-Object {
            Write-Host "Copying PyArmor runtime: $($_.Name)"
            Copy-Item -Path $_.FullName -Destination "src/$($_.Name)" -Recurse -Force
          }
          
          # Debug: Verify runtime is in place
          Write-Host "=== src/ directory structure ==="
          Get-ChildItem -Path src -Directory -Filter "pyarmor_runtime_*"
          
          pyinstaller build/build_exe.spec --clean --noconfirm
          Remove-Item -Path src -Recurse -Force
          Move-Item -Path src_backup -Destination src
      
      - name: Rename output
        shell: powershell
        run: |
          if (Test-Path "dist/BotifyTrades.exe") {
            Rename-Item "dist/BotifyTrades.exe" "BotifyTrades-Admin-Windows.exe"
          }
      
      - name: Upload Windows Admin
        uses: actions/upload-artifact@v4
        with:
          name: BotifyTrades-Admin-Windows-v${{ env.VERSION }}
          path: dist/
          retention-days: 90

  build-linux:
    needs: set-build-type
    runs-on: ubuntu-latest
    
    steps:
      - name: Download modified source
        uses: actions/download-artifact@v4
        with:
          name: source-admin
          path: .
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor pyinstaller
          pip install -r requirements.txt
      
      - name: Restore PyArmor License
        run: |
          echo "${{ secrets.PYARMOR_LICENSE }}" | base64 -d > pyarmor-regfile.zip
          pyarmor reg pyarmor-regfile.zip
          rm pyarmor-regfile.zip
          pyarmor -v
      
      - name: Obfuscate and Build
        run: |
          pyarmor gen --output obfuscated src/
          
          # Debug: Show what PyArmor created
          echo "=== PyArmor output structure ==="
          find obfuscated -type d -name "pyarmor_runtime_*"
          
          cp -r src src_backup
          cp -r obfuscated/src/* src/
          
          # Critical: Copy PyArmor runtime module to src/ directory
          for runtime_dir in obfuscated/pyarmor_runtime_*; do
            if [ -d "$runtime_dir" ]; then
              runtime_name=$(basename "$runtime_dir")
              echo "Copying PyArmor runtime: $runtime_name"
              cp -r "$runtime_dir" "src/$runtime_name"
            fi
          done
          
          # Debug: Verify runtime is in place
          echo "=== src/ directory pyarmor runtimes ==="
          ls -la src/pyarmor_runtime_* 2>/dev/null || echo "No runtime found in src/"
          
          pyinstaller build/build_exe.spec --clean --noconfirm
          rm -rf src && mv src_backup src
      
      - name: Upload Linux Admin
        uses: actions/upload-artifact@v4
        with:
          name: BotifyTrades-Admin-Linux-v${{ env.VERSION }}
          path: dist/
          retention-days: 90

  build-macos-intel:
    needs: set-build-type
    runs-on: macos-15-intel  # Intel x86_64 runner (replaces retired macos-13, available until Aug 2027)

    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"  # Target macOS 12+ to avoid OpenSSL symbol mismatches on older systems

    steps:
      - name: Download modified source
        uses: actions/download-artifact@v4
        with:
          name: source-admin
          path: .

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor pyinstaller
          pip install -r requirements.txt
          pip install "cryptography==42.0.8"
      
      - name: Restore PyArmor License
        run: |
          echo "${{ secrets.PYARMOR_LICENSE }}" | base64 -d > pyarmor-regfile.zip
          pyarmor reg pyarmor-regfile.zip
          rm pyarmor-regfile.zip
          pyarmor -v
      
      - name: Obfuscate and Build
        run: |
          pyarmor gen --output obfuscated src/
          
          # Debug: Show what PyArmor created
          echo "=== PyArmor output structure ==="
          find obfuscated -type d -name "pyarmor_runtime_*"
          
          cp -r src src_backup
          cp -r obfuscated/src/* src/
          
          # Critical: Copy PyArmor runtime module to src/ directory
          for runtime_dir in obfuscated/pyarmor_runtime_*; do
            if [ -d "$runtime_dir" ]; then
              runtime_name=$(basename "$runtime_dir")
              echo "Copying PyArmor runtime: $runtime_name"
              cp -r "$runtime_dir" "src/$runtime_name"
            fi
          done
          
          # Debug: Verify runtime is in place
          echo "=== src/ directory pyarmor runtimes ==="
          ls -la src/pyarmor_runtime_* 2>/dev/null || echo "No runtime found in src/"
          
          pyinstaller build/build_exe.spec --clean --noconfirm
          rm -rf src && mv src_backup src
      
      - name: Fix permissions and sign
        run: |
          # Rename first
          mv dist/DiscordTradingBot dist/BotifyTrades-Admin-macOS-Intel
          
          # Set executable permission
          chmod +x dist/BotifyTrades-Admin-macOS-Intel
          
          # Verify it's a proper executable
          file dist/BotifyTrades-Admin-macOS-Intel
          
          # Ad-hoc code sign (required for macOS to recognize as executable)
          codesign --force --deep --sign - dist/BotifyTrades-Admin-macOS-Intel
          
          # Remove quarantine attribute
          xattr -cr dist/BotifyTrades-Admin-macOS-Intel
          
          echo "=== Final executable check ==="
          ls -la dist/BotifyTrades-Admin-macOS-Intel
          file dist/BotifyTrades-Admin-macOS-Intel
      
      - name: Create tar.gz archive (preserves permissions)
        run: |
          cd dist
          tar -czvf BotifyTrades-Admin-macOS-Intel.tar.gz BotifyTrades-Admin-macOS-Intel
          echo "=== Archive created ==="
          ls -la BotifyTrades-Admin-macOS-Intel.tar.gz
      
      - name: Upload macOS Intel Admin
        uses: actions/upload-artifact@v4
        with:
          name: BotifyTrades-Admin-macOS-Intel-v${{ env.VERSION }}
          path: dist/BotifyTrades-Admin-macOS-Intel.tar.gz
          retention-days: 90

  build-macos-silicon:
    needs: set-build-type
    runs-on: macos-14

    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"  # Silicon Macs start at macOS 14

    steps:
      - name: Download modified source
        uses: actions/download-artifact@v4
        with:
          name: source-admin
          path: .

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyarmor pyinstaller
          pip install -r requirements.txt
          pip install "cryptography==42.0.8"
      
      - name: Restore PyArmor License
        run: |
          echo "${{ secrets.PYARMOR_LICENSE }}" | base64 -d > pyarmor-regfile.zip
          pyarmor reg pyarmor-regfile.zip
          rm pyarmor-regfile.zip
          pyarmor -v
      
      - name: Obfuscate and Build
        run: |
          pyarmor gen --output obfuscated src/
          
          # Debug: Show what PyArmor created
          echo "=== PyArmor output structure ==="
          find obfuscated -type d -name "pyarmor_runtime_*"
          
          cp -r src src_backup
          cp -r obfuscated/src/* src/
          
          # Critical: Copy PyArmor runtime module to src/ directory
          for runtime_dir in obfuscated/pyarmor_runtime_*; do
            if [ -d "$runtime_dir" ]; then
              runtime_name=$(basename "$runtime_dir")
              echo "Copying PyArmor runtime: $runtime_name"
              cp -r "$runtime_dir" "src/$runtime_name"
            fi
          done
          
          # Debug: Verify runtime is in place
          echo "=== src/ directory pyarmor runtimes ==="
          ls -la src/pyarmor_runtime_* 2>/dev/null || echo "No runtime found in src/"
          
          pyinstaller build/build_exe.spec --clean --noconfirm
          rm -rf src && mv src_backup src
      
      - name: Fix permissions and sign
        run: |
          # Rename first
          mv dist/DiscordTradingBot dist/BotifyTrades-Admin-macOS-Silicon
          
          # Set executable permission
          chmod +x dist/BotifyTrades-Admin-macOS-Silicon
          
          # Verify it's a proper executable
          file dist/BotifyTrades-Admin-macOS-Silicon
          
          # Ad-hoc code sign (required for macOS to recognize as executable)
          codesign --force --deep --sign - dist/BotifyTrades-Admin-macOS-Silicon
          
          # Remove quarantine attribute
          xattr -cr dist/BotifyTrades-Admin-macOS-Silicon
          
          echo "=== Final executable check ==="
          ls -la dist/BotifyTrades-Admin-macOS-Silicon
          file dist/BotifyTrades-Admin-macOS-Silicon
      
      - name: Create tar.gz archive (preserves permissions)
        run: |
          cd dist
          tar -czvf BotifyTrades-Admin-macOS-Silicon.tar.gz BotifyTrades-Admin-macOS-Silicon
          echo "=== Archive created ==="
          ls -la BotifyTrades-Admin-macOS-Silicon.tar.gz
      
      - name: Upload macOS Silicon Admin
        uses: actions/upload-artifact@v4
        with:
          name: BotifyTrades-Admin-macOS-Silicon-v${{ env.VERSION }}
          path: dist/BotifyTrades-Admin-macOS-Silicon.tar.gz
          retention-days: 90

  publish-to-private-repo:
    needs: [build-windows, build-linux, build-macos-intel, build-macos-silicon]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases
          pattern: BotifyTrades-Admin-*

      - name: Create Release on Private Repo
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ env.VERSION }}-admin
          name: BotifyTrades Admin v${{ env.VERSION }}
          body: |
            ## BotifyTrades Admin v${{ env.VERSION }}

            ### Downloads
            - **Windows**: BotifyTrades-Admin-Windows.exe
            - **Linux**: BotifyTrades-Admin-Linux
            - **macOS (Intel)**: BotifyTrades-Admin-macOS-Intel.tar.gz
            - **macOS (Apple Silicon)**: BotifyTrades-Admin-macOS-Silicon.tar.gz

            ### Admin Features
            - Full channel mappings (dual-action)
            - Debug tools and admin panel
            - All trading features unlocked
          files: |
            releases/**/*
          draft: false
          prerelease: false

  cleanup:
    needs: [publish-to-private-repo]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete source artifact
        uses: geekyeggo/delete-artifact@v5
        with:
          name: source-admin
