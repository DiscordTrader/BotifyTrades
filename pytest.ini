[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    quick: Fast unit tests that run without external dependencies
    integration: Integration tests that may require database or mock services
    e2e: End-to-end tests that test complete workflows
    license: License system related tests
    broker: Broker connection and trading tests
    signal: Signal parsing and processing tests
    database: Database schema and operation tests
    gui: Web GUI and API route tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
